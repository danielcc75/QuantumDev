services:
  laravel:
    build: .
    working_dir: /app
    command: >
      sh -c "
      composer install &&
      php artisan key:generate &&
      php artisan migrate &&
      php artisan serve --host=0.0.0.0 --port=8000
      "
    container_name: TIS_2026
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - postgres
    environment:
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=Portafolio
      - DB_USERNAME=quantumdev
      - DB_PASSWORD=quantumdev
    networks:
      - quantum_network

  postgres:
    image: postgres:16
    container_name: TIS_2026_DB
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=Portafolio
      - POSTGRES_USER=quantumdev
      - POSTGRES_PASSWORD=quantumdev
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - quantum_network

networks:
  quantum_network:

volumes:
  pgdata: